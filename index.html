<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trend&More Dashboard</title>
<style>
  /* ===== RESET & BASE ===== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg-primary: #0d1117;
    --bg-secondary: #161b22;
    --bg-card: #1c2128;
    --bg-hover: #21262d;
    --bg-input: #0d1117;
    --border: #30363d;
    --border-light: #3d444d;
    --text-primary: #e6edf3;
    --text-secondary: #8b949e;
    --text-muted: #6e7681;
    --accent-green: #3fb950;
    --accent-red: #f85149;
    --accent-blue: #58a6ff;
    --accent-purple: #bc8cff;
    --accent-yellow: #d29922;
    --accent-cyan: #39d2c0;
    --accent-orange: #f0883e;
    --sidebar-width: 280px;
    --header-height: 56px;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    line-height: 1.5;
    overflow: hidden;
    height: 100vh;
  }

  /* ===== LAYOUT ===== */
  .app { display: flex; height: 100vh; }
  .sidebar {
    width: var(--sidebar-width);
    min-width: var(--sidebar-width);
    background: var(--bg-secondary);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .main-header {
    height: var(--header-height);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: var(--bg-secondary);
    flex-shrink: 0;
  }
  .main-content {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
  }

  /* ===== SIDEBAR ===== */
  .sidebar-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    height: var(--header-height);
    flex-shrink: 0;
  }
  .sidebar-header .logo {
    width: 28px; height: 28px;
    background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700; color: #fff;
  }
  .sidebar-header h1 {
    font-size: 15px;
    font-weight: 600;
    color: var(--text-primary);
  }
  .sidebar-section {
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-section:last-child { border-bottom: none; }
  .sidebar-section-title {
    padding: 4px 20px 8px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
  }

  /* Market Overview Mini Cards */
  .market-mini {
    display: flex;
    gap: 8px;
    padding: 0 16px;
    margin-bottom: 4px;
  }
  .market-mini-card {
    flex: 1;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px;
    text-align: center;
  }
  .market-mini-card .label { font-size: 10px; color: var(--text-muted); font-weight: 600; }
  .market-mini-card .value { font-size: 16px; font-weight: 700; margin: 2px 0; font-variant-numeric: tabular-nums; }
  .market-mini-card .change { font-size: 11px; font-weight: 600; }
  .change.up { color: var(--accent-red); }
  .change.down { color: var(--accent-blue); }

  /* Team Members */
  .member-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 20px;
    cursor: pointer;
    transition: background 0.15s;
    border-left: 3px solid transparent;
  }
  .member-item:hover { background: var(--bg-hover); }
  .member-item.active {
    background: var(--bg-hover);
    border-left-color: var(--accent-blue);
  }
  .member-avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; color: #fff;
    flex-shrink: 0;
  }
  .member-info { flex: 1; min-width: 0; }
  .member-name { font-size: 13px; font-weight: 600; }
  .member-role { font-size: 11px; color: var(--text-muted); }
  .member-badge {
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 10px;
    background: var(--bg-card);
    color: var(--text-secondary);
    border: 1px solid var(--border);
  }

  /* Sidebar Nav */
  .sidebar-nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 20px;
    cursor: pointer;
    transition: background 0.15s;
    font-size: 13px;
    color: var(--text-secondary);
    border-left: 3px solid transparent;
  }
  .sidebar-nav-item:hover { background: var(--bg-hover); color: var(--text-primary); }
  .sidebar-nav-item.active { background: var(--bg-hover); color: var(--accent-blue); border-left-color: var(--accent-blue); }
  .sidebar-nav-item .icon { font-size: 16px; width: 20px; text-align: center; }
  .sidebar-nav-item .badge-count {
    margin-left: auto;
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 10px;
    background: var(--accent-blue);
    color: #fff;
    font-weight: 600;
  }

  /* ===== MAIN HEADER ===== */
  .main-header h2 {
    font-size: 16px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .header-actions { display: flex; gap: 8px; align-items: center; }
  .btn {
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg-card);
    color: var(--text-primary);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .btn:hover { background: var(--bg-hover); border-color: var(--border-light); }
  .btn-primary {
    background: var(--accent-blue);
    border-color: var(--accent-blue);
    color: #fff;
  }
  .btn-primary:hover { opacity: 0.9; }
  .btn-sm { padding: 4px 10px; font-size: 11px; }

  /* ===== CARDS ===== */
  .grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  .grid-3 {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
  }
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .card-header {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .card-title {
    font-size: 13px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-body { padding: 16px; }
  .section-gap { margin-bottom: 20px; }

  /* ===== MARKET THOUGHT ===== */
  .thought-text {
    font-size: 14px;
    line-height: 1.7;
    color: var(--text-secondary);
    white-space: pre-wrap;
  }
  .thought-date {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 10px;
  }

  /* ===== TOP PICKS TABLE ===== */
  .picks-table {
    width: 100%;
    border-collapse: collapse;
  }
  .picks-table th {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    text-align: left;
    padding: 6px 10px;
    border-bottom: 1px solid var(--border);
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .picks-table td {
    font-size: 13px;
    padding: 10px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  .picks-table tr:last-child td { border-bottom: none; }
  .picks-table .ticker {
    font-weight: 700;
    color: var(--text-primary);
  }
  .opinion-tag {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 600;
    border: 1px solid;
    white-space: nowrap;
  }
  .ref-list { display: flex; flex-direction: column; }
  .ref-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
  }
  .ref-item:last-child { border-bottom: none; }
  .ref-icon { font-size: 20px; flex-shrink: 0; }
  .ref-info { flex: 1; min-width: 0; }
  .ref-title { font-weight: 600; color: var(--text-primary); font-size: 13px; }
  .ref-title a:hover { text-decoration: underline !important; }
  .ref-desc { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
  .ref-date { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

  /* ===== LIBRARY ===== */
  .lib-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
  .lib-card {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px;
    padding: 16px; display: flex; flex-direction: column; gap: 8px;
    transition: border-color 0.15s;
  }
  .lib-card:hover { border-color: var(--text-muted); }
  .lib-card-top { display: flex; align-items: flex-start; gap: 10px; }
  .lib-type-icon { font-size: 26px; flex-shrink: 0; line-height: 1; }
  .lib-card-title { font-weight: 700; color: var(--text-primary); font-size: 13px; line-height: 1.4; }
  .lib-card-title a { color: var(--accent-blue); text-decoration: none; }
  .lib-card-title a:hover { text-decoration: underline; }
  .lib-card-desc { font-size: 12px; color: var(--text-secondary); }
  .lib-card-meta { display: flex; align-items: center; justify-content: space-between; margin-top: 4px; }
  .lib-meta-left { display: flex; align-items: center; gap: 8px; }
  .lib-type-badge {
    font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 8px; text-transform: uppercase;
  }
  .lib-badge-link  { background: #0e3a52; color: var(--accent-blue); }
  .lib-badge-pdf   { background: #3b1a1a; color: #f85149; }
  .lib-badge-pptx  { background: #3b2810; color: #f0883e; }
  .lib-badge-docx  { background: #0d2a3a; color: #58a6ff; }
  .lib-badge-file  { background: #1e2a1e; color: #3fb950; }
  .lib-card-author { font-size: 11px; color: var(--text-muted); }
  .lib-card-date   { font-size: 11px; color: var(--text-muted); }
  .lib-filter-bar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }

  /* ===== WEEK ACCORDION ===== */
  .week-section { border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 12px; }
  .week-section:last-child { margin-bottom: 0; }
  .week-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 13px 18px; cursor: pointer;
    background: var(--bg-secondary); user-select: none;
    transition: background 0.15s;
  }
  .week-header:hover { background: var(--bg-hover); }
  .week-label { display: flex; align-items: center; gap: 10px; }
  .week-title { font-weight: 700; font-size: 15px; color: var(--text-primary); }
  .week-date-sub { font-size: 12px; color: var(--text-muted); }
  .badge-current {
    background: var(--accent-green); color: #0d1117;
    font-size: 11px; font-weight: 700; padding: 2px 9px; border-radius: 10px;
  }
  .week-toggle {
    background: none; border: none; color: var(--text-secondary);
    cursor: pointer; padding: 4px; display: flex; align-items: center;
    transition: transform 0.2s;
  }
  .week-toggle.open { transform: rotate(180deg); }
  .week-body { display: none; padding: 16px; background: var(--bg-primary); }
  .week-body.open { display: block; }
  .week-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
  .week-refs { margin-top: 14px; }
  .picks-table .company {
    color: var(--text-secondary);
    font-size: 11px;
  }
  .picks-table .reason {
    font-size: 12px;
    color: var(--text-secondary);
    max-width: 200px;
  }
  .tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
  }
  .tag-buy { background: rgba(63,185,80,0.15); color: var(--accent-green); }
  .tag-sell { background: rgba(248,81,73,0.15); color: var(--accent-red); }
  .tag-hold { background: rgba(210,153,34,0.15); color: var(--accent-yellow); }
  .tag-watch { background: rgba(88,166,255,0.15); color: var(--accent-blue); }

  /* ===== PORTFOLIO ===== */
  .portfolio-summary {
    display: flex;
    gap: 16px;
    margin-bottom: 16px;
  }
  .portfolio-stat {
    flex: 1;
    background: var(--bg-primary);
    border-radius: 8px;
    padding: 12px;
    text-align: center;
  }
  .portfolio-stat .stat-label { font-size: 11px; color: var(--text-muted); }
  .portfolio-stat .stat-value { font-size: 20px; font-weight: 700; margin-top: 2px; font-variant-numeric: tabular-nums; }
  .holding-row {
    display: flex;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    gap: 12px;
  }
  .holding-row:last-child { border-bottom: none; }
  .holding-name { flex: 1; }
  .holding-name .name { font-size: 13px; font-weight: 600; }
  .holding-name .sub { font-size: 11px; color: var(--text-muted); }
  .holding-weight {
    width: 60px;
    text-align: right;
    font-size: 13px;
    font-weight: 600;
    color: var(--accent-cyan);
  }
  .holding-return {
    width: 70px;
    text-align: right;
    font-size: 13px;
    font-weight: 600;
  }
  .weight-bar-bg {
    width: 80px;
    height: 6px;
    background: var(--bg-primary);
    border-radius: 3px;
    overflow: hidden;
  }
  .weight-bar {
    height: 100%;
    border-radius: 3px;
    background: var(--accent-cyan);
    transition: width 0.3s;
  }

  /* ===== IDEA CARDS ===== */
  .idea-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
  }
  .idea-card {
    background: var(--bg-primary);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    transition: border-color 0.15s;
  }
  .idea-card:hover { border-color: var(--border-light); }
  .idea-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .idea-ticker { font-size: 14px; font-weight: 700; }
  .idea-body { font-size: 12px; color: var(--text-secondary); line-height: 1.6; }
  .idea-meta {
    margin-top: 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text-muted);
  }
  .idea-target { font-weight: 600; color: var(--accent-green); }

  /* ===== IDEA BOARD (ALL) ===== */
  .board-filters {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .filter-chip {
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-chip:hover { border-color: var(--border-light); color: var(--text-primary); }
  .filter-chip.active { background: var(--accent-blue); border-color: var(--accent-blue); color: #fff; }

  /* ===== MODAL ===== */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 12px;
    width: 90%;
    max-width: 520px;
    max-height: 85vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .modal-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .modal-header h3 { font-size: 15px; font-weight: 600; }
  .modal-close {
    width: 28px; height: 28px;
    border-radius: 6px;
    border: none;
    background: transparent;
    color: var(--text-secondary);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .modal-close:hover { background: var(--bg-hover); }
  .modal-body { padding: 20px; }
  .modal-footer {
    padding: 14px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: flex-end;
    gap: 8px;
  }
  .form-group { margin-bottom: 14px; }
  .form-group label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-secondary);
    margin-bottom: 6px;
  }
  .form-group input, .form-group textarea, .form-group select {
    width: 100%;
    padding: 8px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg-input);
    color: var(--text-primary);
    font-size: 13px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
  }
  .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
    border-color: var(--accent-blue);
  }
  .form-group textarea { resize: vertical; min-height: 80px; }
  .form-row {
    display: flex;
    gap: 12px;
  }
  .form-row .form-group { flex: 1; }

  /* ===== SCROLLBAR ===== */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--border-light); }

  /* ===== EMPTY STATE ===== */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-muted);
  }
  .empty-state .icon { font-size: 36px; margin-bottom: 12px; }
  .empty-state p { font-size: 13px; margin-bottom: 16px; }

  /* ===== ADD MEMBER BUTTON ===== */
  .add-member-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 20px;
    cursor: pointer;
    color: var(--text-muted);
    font-size: 12px;
    transition: all 0.15s;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
  }
  .add-member-btn:hover { color: var(--accent-blue); background: var(--bg-hover); }
  .btn-delete-member {
    border: none;
    background: none;
    color: var(--text-muted);
    font-size: 16px;
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 4px;
    opacity: 0;
    transition: all 0.15s;
  }
  .member-item:hover .btn-delete-member { opacity: 1; }
  .btn-delete-member:hover { color: var(--accent-red); background: var(--bg-card); }
  .member-item-actions { display: flex; align-items: center; gap: 2px; }
  .btn-move-member {
    border: none; background: none; color: var(--text-muted);
    font-size: 12px; cursor: pointer; padding: 2px 4px; border-radius: 4px;
    opacity: 0; line-height: 1;
  }
  .member-item:hover .btn-move-member { opacity: 1; }
  .btn-move-member:hover { color: var(--text-primary); background: var(--bg-card); }
  .badge-new {
    font-size: 9px; font-weight: 800; padding: 2px 6px; border-radius: 8px;
    background: var(--accent-green); color: #0d1117; letter-spacing: 0.5px;
    animation: pulse-new 2s ease-in-out infinite;
  }
  @keyframes pulse-new { 0%,100%{opacity:1} 50%{opacity:0.6} }
  .nav-new-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent-green); margin-left: 4px;
    animation: pulse-new 2s ease-in-out infinite;
  }

  /* ===== CHART PLACEHOLDER ===== */
  .mini-chart {
    height: 40px;
    display: flex;
    align-items: flex-end;
    gap: 2px;
    padding: 0 10px;
  }
  .mini-chart .bar {
    flex: 1;
    border-radius: 2px 2px 0 0;
    min-height: 4px;
    transition: height 0.3s;
  }

  /* ===== DONUT CHART ===== */
  .donut-container {
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 8px 0;
  }
  .donut-chart {
    width: 120px;
    height: 120px;
    flex-shrink: 0;
  }
  .donut-legend { flex: 1; }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 3px 0;
    font-size: 12px;
  }
  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .legend-label { flex: 1; color: var(--text-secondary); }
  .legend-value { font-weight: 600; font-variant-numeric: tabular-nums; }

  /* timestamp */
  .update-time {
    font-size: 11px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 4px;
  }

const expandedWeeks = new Set();

function getWeek(m, weekId) {
  return (m.weeks || []).find(w => w.id === weekId);
}

function formatWeekLabel(dateStr) {
  if (!dateStr) return '주차 미정';
  const d = new Date(dateStr + 'T00:00:00');
  const year = d.getFullYear();
  const month = d.getMonth() + 1;
  const firstDayOfMonth = new Date(year, d.getMonth(), 1).getDay();
  const weekNum = Math.ceil((d.getDate() + firstDayOfMonth) / 7);
  return `${year}년 ${month}월 ${weekNum}주차`;
}

function toggleWeek(weekId) {
  if (expandedWeeks.has(weekId)) expandedWeeks.delete(weekId);

}

function deleteWeek(weekId) {
  const m = getMember(selectedMemberId);
  if (!m) return;
  const week = getWeek(m, weekId);
  if (!week) return;
  const label = formatWeekLabel(week.startDate);
  if (!confirm(`"${label}" 기록을 삭제하시겠습니까?\n이 작업은 되돌릴 수 없습니다.`)) return;
  m.weeks = m.weeks.filter(w => w.id !== weekId);
  expandedWeeks.delete(weekId);
  saveData();
  renderMemberView();
}

function openWeekModal(type, weekId) {
  targetWeekId = weekId;
  openModal(type);
}

function moveMember(id, dir) {
  const idx = appData.members.findIndex(m => m.id === id);
  if (idx < 0) return;
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= appData.members.length) return;
  const tmp = appData.members[idx];
  appData.members[idx] = appData.members[newIdx];
  appData.members[newIdx] = tmp;
  saveData();
  renderSidebar();
}

function addNewWeek() {
  const m = getMember(selectedMemberId);
  if (!m) return;
  if (!m.weeks) m.weeks = [];
  if (m.weeks.length > 0 && !confirm('새 주차를 시작하겠습니까?\n이전 주차는 기록으로 보존됩니다.')) return;
  const weekId = 'w_' + Date.now();
  m.weeks.unshift({ id: weekId, startDate: todayStr(), thought: '', thoughtDate: todayStr(), topPicks: [], holdings: [], refs: [], createdAt: Date.now() });
  expandedWeeks.clear();
  expandedWeeks.add(weekId);
  saveData();
  renderMemberView();
}

// ===== RENDER FUNCTIONS =====

const NEW_THRESHOLD = 24 * 60 * 60 * 1000; // 24시간(ms)
function isNew(ts) { return ts && (Date.now() - ts) < NEW_THRESHOLD; }

function renderSidebar() {
  const list = document.getElementById('member-list');
  list.innerHTML = '';
  const total = appData.members.length;
  appData.members.forEach((m, idx) => {
    const div = document.createElement('div');
    div.className = 'member-item' + (selectedMemberId === m.id ? ' active' : '');
    div.onclick = () => selectMember(m.id);
    const latestWeek = (m.weeks || [])[0];
    const pickCount = latestWeek ? (latestWeek.topPicks || []).length : 0;
    const memberHasNew = (m.weeks || []).some(w => isNew(w.createdAt));
    div.innerHTML = `
      <div class="member-avatar" style="background:${m.color}">${m.name[0]}</div>
      <div class="member-info">
        <div class="member-name">${m.name}</div>
      </div>
      ${memberHasNew ? '<span class="badge-new">NEW</span>' : `<span class="member-badge">${pickCount} picks</span>`}
      <div class="member-item-actions">
        <button class="btn-move-member" onclick="event.stopPropagation(); moveMember('${m.id}',-1)" title="위로" ${idx === 0 ? 'disabled style="visibility:hidden"' : ''}>▲</button>
        <button class="btn-move-member" onclick="event.stopPropagation(); moveMember('${m.id}',1)" title="아래로" ${idx === total-1 ? 'disabled style="visibility:hidden"' : ''}>▼</button>
        <button class="btn-delete-member" onclick="event.stopPropagation(); deleteMember('${m.id}')" title="삭제">×</button>
      </div>
    `;
    list.appendChild(div);
  });

  const totalIdeas = appData.members.reduce((s, m) =>
    s + (m.weeks || []).reduce((ws, w) => ws + (w.holdings || []).filter(h => h.idea).length, 0), 0);
  document.getElementById('idea-count').textContent = totalIdeas;

  const libItems = appData.library || [];
  const libCount = libItems.length;
  const libHasNew = libItems.some(r => isNew(r.createdAt));
  document.getElementById('library-count').textContent = libCount;

  // NEW 점 표시 (nav 아이템 옆)
  ['nav-idea-board','nav-library'].forEach(id => {
    const el = document.getElementById(id);
    el.querySelectorAll('.nav-new-dot').forEach(d => d.remove());
  });
  if (libHasNew) {
    const dot = document.createElement('span');
    dot.className = 'nav-new-dot';
    document.getElementById('nav-library').appendChild(dot);
  }
}

// ===== DONUT CHART =====
function drawDonut(m) {
  const svg = document.getElementById(`donut-${m.id}`);
  const legend = document.getElementById(`legend-${m.id}`);
  if (!svg || !legend) return;

  svg.innerHTML = '';
  legend.innerHTML = '';

  const cx = 60, cy = 60, r = 45, strokeW = 18;
  const circumference = 2 * Math.PI * r;
  let offset = 0;

  m.holdings.forEach((h, i) => {
    const pct = h.weight / 100;
    const dash = pct * circumference;
    const gap = circumference - dash;
    const color = COLORS[i % COLORS.length];

    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    circle.setAttribute('cx', cx);
    circle.setAttribute('cy', cy);
    circle.setAttribute('r', r);
    circle.setAttribute('fill', 'none');
    circle.setAttribute('stroke', color);
    circle.setAttribute('stroke-width', strokeW);
    circle.setAttribute('stroke-dasharray', `${dash} ${gap}`);
    circle.setAttribute('stroke-dashoffset', -offset);
    circle.setAttribute('transform', `rotate(-90 ${cx} ${cy})`);
    svg.appendChild(circle);
    offset += dash;

    legend.innerHTML += `
      <div class="legend-item">
        <span class="legend-dot" style="background:${color}"></span>
        <span class="legend-label">${h.name}</span>
        <span class="legend-value">${h.weight}%</span>
      </div>
    `;
  });
}

function deleteMember(id) {
  const m = getMember(id);
  if (!m) return;
  if (!confirm(`"${m.name}" 팀원을 삭제하시겠습니까?`)) return;
  appData.members = appData.members.filter(m => m.id !== id);
  if (selectedMemberId === id) {
    selectedMemberId = appData.members.length > 0 ? appData.members[0].id : null;
    if (selectedMemberId) renderMemberView();
    else {
      document.getElementById('main-title-text').textContent = '팀원을 선택하세요';
      document.getElementById('main-content').innerHTML = '<div class="empty-state"><div class="icon">👈</div><p>왼쪽 사이드바에서 팀원을 선택하거나<br>새로운 팀원을 추가해 주세요.</p></div>';
      document.getElementById('header-actions').innerHTML = '';
    }
  }
  saveData();
  renderSidebar();
}

function addMember() {
  const name = document.getElementById('input-member-name').value.trim();
  const role = document.getElementById('input-member-role').value.trim();
  if (!name) return;
  const id = 'm' + Date.now();
  appData.members.push({
    id, name, role: role || '미정',
    color: COLORS[appData.members.length % COLORS.length],
    weeks: []
  });
  closeAllModals();
  document.getElementById('input-member-name').value = '';
  document.getElementById('input-member-role').value = '';
  saveData();
  renderSidebar();
  selectMember(id);
}

function openEditThought(weekId) {
  targetWeekId = weekId;
  const m = getMember(selectedMemberId);
  if (!m) return;
  const week = getWeek(m, weekId);
  if (!week) return;
  document.getElementById('input-thought').value = week.thought || '';
  openModal('edit-thought');
}

function saveThought() {
  const m = getMember(selectedMemberId);
  if (!m) return;
  const week = getWeek(m, targetWeekId);
  if (!week) return;
  week.thought = document.getElementById('input-thought').value;
  week.thoughtDate = todayStr();
  closeAllModals();
  saveData();
  renderMemberView();
}

function addTopPick() {
  const m = getMember(selectedMemberId);
  if (!m) return;
  const week = getWeek(m, targetWeekId);
  if (!week) return;
  const name = document.getElementById('input-pick-name').value.trim();
  if (!name) return;
  week.topPicks.push({ name, reason: document.getElementById('input-pick-reason').value.trim() });
  closeAllModals();
  ['input-pick-name','input-pick-reason'].forEach(id => document.getElementById(id).value = '');
  saveData();
  renderMemberView();
  renderSidebar();
}

function removePick(weekId, idx) {
  const m = getMember(selectedMemberId);
  if (!m) return;
  const week = getWeek(m, weekId);
  if (!week) return;
  week.topPicks.splice(idx, 1);
  saveData();
  renderMemberView();
  renderSidebar();
}

function addHolding() {
  const m = getMember(selectedMemberId);
  if (!m) return;
  const week = getWeek(m, targetWeekId);
  if (!week) return;
  const name = document.getElementById('input-holding-name').value.trim();
  if (!name) return;
  week.holdings.push({
    name,
    status: document.getElementById('input-holding-status').value,
    idea: document.getElementById('input-holding-idea').value.trim()
  });
  closeAllModals();
  document.getElementById('input-holding-name').value = '';
  document.getElementById('input-holding-status').value = '신규편입';
  document.getElementById('input-holding-idea').value = '';
  saveData();
  renderMemberView();
}

function removeHolding(weekId, idx) {
  const m = getMember(selectedMemberId);
  if (!m) return;
  const week = getWeek(m, weekId);
  if (!week) return;
  week.holdings.splice(idx, 1);
  saveData();
  renderMemberView();
}

function toggleRefFields() {
  const type = document.getElementById('input-ref-type').value;
  document.getElementById('ref-url-group').style.display = type === 'link' ? '' : 'none';
  document.getElementById('ref-file-group').style.display = type === 'file' ? '' : 'none';
}

function addRef() {
  const m = getMember(selectedMemberId);
  if (!m) return;
  const week = getWeek(m, targetWeekId);
  if (!week) return;
  const title = document.getElementById('input-ref-title').value.trim();
  if (!title) return;
  const type = document.getElementById('input-ref-type').value;
  if (!week.refs) week.refs = [];
  week.refs.push({
    type, title,
    url: type === 'link' ? document.getElementById('input-ref-url').value.trim() : '',
    filename: type === 'file' ? document.getElementById('input-ref-filename').value.trim() : '',
    desc: document.getElementById('input-ref-desc').value.trim(),
    date: todayStr()
  });
  closeAllModals();
  ['input-ref-title','input-ref-url','input-ref-filename','input-ref-desc'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('input-ref-type').value = 'link';
  toggleRefFields();
  saveData();
  renderMemberView();
}

function removeRef(weekId, idx) {
  const m = getMember(selectedMemberId);
  if (!m) return;
  const week = getWeek(m, weekId);
  if (!week || !week.refs) return;
  week.refs.splice(idx, 1);
  saveData();
  renderMemberView();
}


// ===== UTILS =====
function opinionLabel(op) {
  return { buy: '매수', sell: '매도', hold: '보유', watch: '관심' }[op] || op;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// Close modal on overlay click
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) closeAllModals();
  });
});

// ===== INIT =====
db.ref('dashboard').on('value', (snapshot) => {
  const data = snapshot.val();
  if (data) {
    appData = data;
    appData.members = appData.members || [];
    appData.library = appData.library || [];
    let needsMigration = false;
    appData.members.forEach(m => {
      // 구버전(flat 구조) → 신버전(weeks[]) 마이그레이션
      if (!m.weeks && (m.thought !== undefined || m.topPicks !== undefined)) {
        m.weeks = [{
          id: 'w_migrated_' + m.id,
          startDate: m.thoughtDate || todayStr(),
          thought: m.thought || '',
          thoughtDate: m.thoughtDate || todayStr(),
          topPicks: m.topPicks || [],
          holdings: m.holdings || [],
          refs: m.refs || []
        }];
        delete m.thought; delete m.thoughtDate;
        delete m.topPicks; delete m.holdings;
        delete m.ideas; delete m.refs; delete m.role;
        needsMigration = true;
      }
      // Firebase null 배열 보정
      m.weeks = m.weeks || [];
      m.weeks.forEach(w => {
        w.topPicks = w.topPicks || [];
        w.holdings = w.holdings || [];
        w.refs = w.refs || [];
      });
    });
    if (needsMigration) saveData();
  } else {
    appData = getSampleData();
    saveData();
  }
  document.getElementById('loading-overlay').style.display = 'none';
  renderSidebar();
  if (currentView === 'library') {
    showLibrary();
  } else if (selectedMemberId && appData.members.find(m => m.id === selectedMemberId)) {
    if (currentView === 'ideas') showIdeaBoard();
    else renderMemberView();
  } else if (appData.members.length > 0) {
    selectMember(appData.members[0].id);
  }
});
</script>
