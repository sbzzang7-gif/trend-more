<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>팀 투자 대시보드</title>
<style>
  /* ===== RESET & BASE ===== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg-primary: #0d1117;
    --bg-secondary: #161b22;
    --bg-card: #1c2128;
    --bg-hover: #21262d;
    --bg-input: #0d1117;
    --border: #30363d;
    --border-light: #3d444d;
    --text-primary: #e6edf3;
    --text-secondary: #8b949e;
    --text-muted: #6e7681;
    --accent-green: #3fb950;
    --accent-red: #f85149;
    --accent-blue: #58a6ff;
    --accent-purple: #bc8cff;
    --accent-yellow: #d29922;
    --accent-cyan: #39d2c0;
    --accent-orange: #f0883e;
    --sidebar-width: 280px;
    --header-height: 56px;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    line-height: 1.5;
    overflow: hidden;
    height: 100vh;
  }

  /* ===== LAYOUT ===== */
  .app { display: flex; height: 100vh; }
  .sidebar {
    width: var(--sidebar-width);
    min-width: var(--sidebar-width);
    background: var(--bg-secondary);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .main-header {
    height: var(--header-height);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: var(--bg-secondary);
    flex-shrink: 0;
  }
  .main-content {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
  }

  /* ===== SIDEBAR ===== */
  .sidebar-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    height: var(--header-height);
    flex-shrink: 0;
  }
  .sidebar-header .logo {
    width: 28px; height: 28px;
    background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700; color: #fff;
  }
  .sidebar-header h1 {
    font-size: 15px;
    font-weight: 600;
    color: var(--text-primary);
  }
  .sidebar-section {
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-section:last-child { border-bottom: none; }
  .sidebar-section-title {
    padding: 4px 20px 8px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-muted);
  }

  /* Market Overview Mini Cards */
  .market-mini {
    display: flex;
    gap: 8px;
    padding: 0 16px;
    margin-bottom: 4px;
  }
  .market-mini-card {
    flex: 1;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px;
    text-align: center;
  }
  .market-mini-card .label { font-size: 10px; color: var(--text-muted); font-weight: 600; }
  .market-mini-card .value { font-size: 16px; font-weight: 700; margin: 2px 0; font-variant-numeric: tabular-nums; }
  .market-mini-card .change { font-size: 11px; font-weight: 600; }
  .change.up { color: var(--accent-red); }
  .change.down { color: var(--accent-blue); }

  /* Team Members */
  .member-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 20px;
    cursor: pointer;
    transition: background 0.15s;
    border-left: 3px solid transparent;
  }
  .member-item:hover { background: var(--bg-hover); }
  .member-item.active {
    background: var(--bg-hover);
    border-left-color: var(--accent-blue);
  }
  .member-avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; color: #fff;
    flex-shrink: 0;
  }
  .member-info { flex: 1; min-width: 0; }
  .member-name { font-size: 13px; font-weight: 600; }
  .member-role { font-size: 11px; color: var(--text-muted); }
  .member-badge {
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 10px;
    background: var(--bg-card);
    color: var(--text-secondary);
    border: 1px solid var(--border);
  }

  /* Sidebar Nav */
  .sidebar-nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 20px;
    cursor: pointer;
    transition: background 0.15s;
    font-size: 13px;
    color: var(--text-secondary);
    border-left: 3px solid transparent;
  }
  .sidebar-nav-item:hover { background: var(--bg-hover); color: var(--text-primary); }
  .sidebar-nav-item.active { background: var(--bg-hover); color: var(--accent-blue); border-left-color: var(--accent-blue); }
  .sidebar-nav-item .icon { font-size: 16px; width: 20px; text-align: center; }
  .sidebar-nav-item .badge-count {
    margin-left: auto;
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 10px;
    background: var(--accent-blue);
    color: #fff;
    font-weight: 600;
  }

  /* ===== MAIN HEADER ===== */
  .main-header h2 {
    font-size: 16px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .header-actions { display: flex; gap: 8px; align-items: center; }
  .btn {
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg-card);
    color: var(--text-primary);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .btn:hover { background: var(--bg-hover); border-color: var(--border-light); }
  .btn-primary {
    background: var(--accent-blue);
    border-color: var(--accent-blue);
    color: #fff;
  }
  .btn-primary:hover { opacity: 0.9; }
  .btn-sm { padding: 4px 10px; font-size: 11px; }

  /* ===== CARDS ===== */
  .grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  .grid-3 {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
  }
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }
  .card-header {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .card-title {
    font-size: 13px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-body { padding: 16px; }
  .section-gap { margin-bottom: 20px; }

  /* ===== MARKET THOUGHT ===== */
  .thought-text {
    font-size: 14px;
    line-height: 1.7;
    color: var(--text-secondary);
    white-space: pre-wrap;
  }
  .thought-date {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 10px;
  }

  /* ===== TOP PICKS TABLE ===== */
  .picks-table {
    width: 100%;
    border-collapse: collapse;
  }
  .picks-table th {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    text-align: left;
    padding: 6px 10px;
    border-bottom: 1px solid var(--border);
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .picks-table td {
    font-size: 13px;
    padding: 10px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  .picks-table tr:last-child td { border-bottom: none; }
  .picks-table .ticker {
    font-weight: 700;
    color: var(--text-primary);
  }
  .picks-table .company {
    color: var(--text-secondary);
    font-size: 11px;
  }
  .picks-table .reason {
    font-size: 12px;
    color: var(--text-secondary);
    max-width: 200px;
  }
  .tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
  }
  .tag-buy { background: rgba(63,185,80,0.15); color: var(--accent-green); }
  .tag-sell { background: rgba(248,81,73,0.15); color: var(--accent-red); }
  .tag-hold { background: rgba(210,153,34,0.15); color: var(--accent-yellow); }
  .tag-watch { background: rgba(88,166,255,0.15); color: var(--accent-blue); }

  /* ===== PORTFOLIO ===== */
  .portfolio-summary {
    display: flex;
    gap: 16px;
    margin-bottom: 16px;
  }
  .portfolio-stat {
    flex: 1;
    background: var(--bg-primary);
    border-radius: 8px;
    padding: 12px;
    text-align: center;
  }
  .portfolio-stat .stat-label { font-size: 11px; color: var(--text-muted); }
  .portfolio-stat .stat-value { font-size: 20px; font-weight: 700; margin-top: 2px; font-variant-numeric: tabular-nums; }
  .holding-row {
    display: flex;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    gap: 12px;
  }
  .holding-row:last-child { border-bottom: none; }
  .holding-name { flex: 1; }
  .holding-name .name { font-size: 13px; font-weight: 600; }
  .holding-name .sub { font-size: 11px; color: var(--text-muted); }
  .holding-weight {
    width: 60px;
    text-align: right;
    font-size: 13px;
    font-weight: 600;
    color: var(--accent-cyan);
  }
  .holding-return {
    width: 70px;
    text-align: right;
    font-size: 13px;
    font-weight: 600;
  }
  .weight-bar-bg {
    width: 80px;
    height: 6px;
    background: var(--bg-primary);
    border-radius: 3px;
    overflow: hidden;
  }
  .weight-bar {
    height: 100%;
    border-radius: 3px;
    background: var(--accent-cyan);
    transition: width 0.3s;
  }

  /* ===== IDEA CARDS ===== */
  .idea-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
  }
  .idea-card {
    background: var(--bg-primary);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    transition: border-color 0.15s;
  }
  .idea-card:hover { border-color: var(--border-light); }
  .idea-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .idea-ticker { font-size: 14px; font-weight: 700; }
  .idea-body { font-size: 12px; color: var(--text-secondary); line-height: 1.6; }
  .idea-meta {
    margin-top: 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text-muted);
  }
  .idea-target { font-weight: 600; color: var(--accent-green); }

  /* ===== IDEA BOARD (ALL) ===== */
  .board-filters {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .filter-chip {
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-chip:hover { border-color: var(--border-light); color: var(--text-primary); }
  .filter-chip.active { background: var(--accent-blue); border-color: var(--accent-blue); color: #fff; }

  /* ===== MODAL ===== */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 12px;
    width: 90%;
    max-width: 520px;
    max-height: 85vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .modal-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .modal-header h3 { font-size: 15px; font-weight: 600; }
  .modal-close {
    width: 28px; height: 28px;
    border-radius: 6px;
    border: none;
    background: transparent;
    color: var(--text-secondary);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .modal-close:hover { background: var(--bg-hover); }
  .modal-body { padding: 20px; }
  .modal-footer {
    padding: 14px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: flex-end;
    gap: 8px;
  }
  .form-group { margin-bottom: 14px; }
  .form-group label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-secondary);
    margin-bottom: 6px;
  }
  .form-group input, .form-group textarea, .form-group select {
    width: 100%;
    padding: 8px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg-input);
    color: var(--text-primary);
    font-size: 13px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
  }
  .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
    border-color: var(--accent-blue);
  }
  .form-group textarea { resize: vertical; min-height: 80px; }
  .form-row {
    display: flex;
    gap: 12px;
  }
  .form-row .form-group { flex: 1; }

  /* ===== SCROLLBAR ===== */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--border-light); }

  /* ===== EMPTY STATE ===== */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-muted);
  }
  .empty-state .icon { font-size: 36px; margin-bottom: 12px; }
  .empty-state p { font-size: 13px; margin-bottom: 16px; }

  /* ===== ADD MEMBER BUTTON ===== */
  .add-member-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 20px;
    cursor: pointer;
    color: var(--text-muted);
    font-size: 12px;
    transition: all 0.15s;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
  }
  .add-member-btn:hover { color: var(--accent-blue); background: var(--bg-hover); }

  /* ===== CHART PLACEHOLDER ===== */
  .mini-chart {
    height: 40px;
    display: flex;
    align-items: flex-end;
    gap: 2px;
    padding: 0 10px;
  }
  .mini-chart .bar {
    flex: 1;
    border-radius: 2px 2px 0 0;
    min-height: 4px;
    transition: height 0.3s;
  }

  /* ===== DONUT CHART ===== */
  .donut-container {
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 8px 0;
  }
  .donut-chart {
    width: 120px;
    height: 120px;
    flex-shrink: 0;
  }
  .donut-legend { flex: 1; }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 3px 0;
    font-size: 12px;
  }
  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .legend-label { flex: 1; color: var(--text-secondary); }
  .legend-value { font-weight: 600; font-variant-numeric: tabular-nums; }

  /* timestamp */
  .update-time {
    font-size: 11px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 4px;
  }
</style>
</head>
<body>

<div class="app">
  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">T</div>
      <h1>팀 투자 대시보드</h1>
    </div>

    <!-- Market Overview -->
    <div class="sidebar-section">
      <div class="sidebar-section-title">시장 개요</div>
      <div class="market-mini">
        <div class="market-mini-card">
          <div class="label">KOSPI</div>
          <div class="value" id="kospi-val">2,847</div>
          <div class="change up" id="kospi-chg">+1.24%</div>
        </div>
        <div class="market-mini-card">
          <div class="label">KOSDAQ</div>
          <div class="value" id="kosdaq-val">923</div>
          <div class="change down" id="kosdaq-chg">-0.31%</div>
        </div>
      </div>
      <div class="market-mini" style="margin-top:8px;">
        <div class="market-mini-card">
          <div class="label">USD/KRW</div>
          <div class="value" style="font-size:14px;" id="usdkrw-val">1,372</div>
          <div class="change down" id="usdkrw-chg">-0.15%</div>
        </div>
        <div class="market-mini-card">
          <div class="label">국채10Y</div>
          <div class="value" style="font-size:14px;" id="bond-val">3.42%</div>
          <div class="change up" id="bond-chg">+2bp</div>
        </div>
      </div>
    </div>

    <!-- Team Members -->
    <div class="sidebar-section" style="flex:1;">
      <div class="sidebar-section-title">팀원</div>
      <div id="member-list"></div>
      <button class="add-member-btn" onclick="openModal('add-member')">
        <span>＋</span> 팀원 추가
      </button>
    </div>

    <!-- Navigation -->
    <div class="sidebar-section">
      <div class="sidebar-nav-item" id="nav-idea-board" onclick="showIdeaBoard()">
        <span class="icon">💡</span>
        <span>아이디어 보드</span>
        <span class="badge-count" id="idea-count">0</span>
      </div>
    </div>
  </aside>

  <!-- ===== MAIN ===== -->
  <div class="main">
    <div class="main-header">
      <h2 id="main-title">
        <span id="main-title-text">팀원을 선택하세요</span>
      </h2>
      <div class="header-actions" id="header-actions"></div>
    </div>
    <div class="main-content" id="main-content">
      <div class="empty-state">
        <div class="icon">👈</div>
        <p>왼쪽 사이드바에서 팀원을 선택하거나<br>새로운 팀원을 추가해 주세요.</p>
      </div>
    </div>
  </div>
</div>

<!-- ===== MODALS ===== -->

<!-- Add Member Modal -->
<div class="modal-overlay" id="modal-add-member">
  <div class="modal">
    <div class="modal-header">
      <h3>팀원 추가</h3>
      <button class="modal-close" onclick="closeAllModals()">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>이름</label>
        <input type="text" id="input-member-name" placeholder="예: 홍길동">
      </div>
      <div class="form-group">
        <label>역할 / 포지션</label>
        <input type="text" id="input-member-role" placeholder="예: 성장주 담당, 가치투자 등">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeAllModals()">취소</button>
      <button class="btn btn-primary" onclick="addMember()">추가</button>
    </div>
  </div>
</div>

<!-- Edit Market Thought Modal -->
<div class="modal-overlay" id="modal-edit-thought">
  <div class="modal">
    <div class="modal-header">
      <h3>시장 생각 수정</h3>
      <button class="modal-close" onclick="closeAllModals()">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>시장에 대한 생각을 자유롭게 작성하세요</label>
        <textarea id="input-thought" rows="6" placeholder="예: 반도체 섹터가 바닥을 다지는 중으로 보임. 하반기 실적 개선 기대..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeAllModals()">취소</button>
      <button class="btn btn-primary" onclick="saveThought()">저장</button>
    </div>
  </div>
</div>

<!-- Add Top Pick Modal -->
<div class="modal-overlay" id="modal-add-pick">
  <div class="modal">
    <div class="modal-header">
      <h3>Top Pick 추가</h3>
      <button class="modal-close" onclick="closeAllModals()">×</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group">
          <label>종목명</label>
          <input type="text" id="input-pick-name" placeholder="예: 삼성전자">
        </div>
        <div class="form-group">
          <label>종목코드</label>
          <input type="text" id="input-pick-code" placeholder="예: 005930">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">

function filterIdeas(el, type) {
  document.querySelectorAll('.board-filters .filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');

  let allIdeas = [];
  appData.members.forEach(m => {
    m.ideas.forEach(idea => {
      allIdeas.push({ ...idea, memberName: m.name, memberColor: m.color });
    });
  });
  if (type !== 'all') allIdeas = allIdeas.filter(i => i.opinion === type);
  allIdeas.sort((a,b) => b.date.localeCompare(a.date));

  document.getElementById('board-ideas').innerHTML = allIdeas.map(
    idea => renderIdeaCard(idea, idea.memberName, idea.memberColor, -1)
  ).join('') || '<div class="empty-state" style="grid-column:1/-1"><p>해당 필터에 맞는 아이디어가 없습니다</p></div>';
}

// ===== DONUT CHART =====
function drawDonut(m) {
  const svg = document.getElementById(`donut-${m.id}`);
  const legend = document.getElementById(`legend-${m.id}`);
  if (!svg || !legend) return;

  svg.innerHTML = '';
  legend.innerHTML = '';

  const cx = 60, cy = 60, r = 45, strokeW = 18;
  const circumference = 2 * Math.PI * r;
  let offset = 0;

  m.holdings.forEach((h, i) => {
    const pct = h.weight / 100;
    const dash = pct * circumference;
    const gap = circumference - dash;
    const color = COLORS[i % COLORS.length];

    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    circle.setAttribute('cx', cx);
    circle.setAttribute('cy', cy);
    circle.setAttribute('r', r);
    circle.setAttribute('fill', 'none');
    circle.setAttribute('stroke', color);
    circle.setAttribute('stroke-width', strokeW);
    circle.setAttribute('stroke-dasharray', `${dash} ${gap}`);
    circle.setAttribute('stroke-dashoffset', -offset);
    circle.setAttribute('transform', `rotate(-90 ${cx} ${cy})`);
    svg.appendChild(circle);
    offset += dash;

    legend.innerHTML += `
      <div class="legend-item">
        <span class="legend-dot" style="background:${color}"></span>
        <span class="legend-label">${h.name}</span>
        <span class="legend-value">${h.weight}%</span>
      </div>
    `;
  });
}

  openModal('edit-thought');
}

// ===== DATA ACTIONS =====
function addMember() {
  const name = document.getElementById('input-member-name').value.trim();
  const role = document.getElementById('input-member-role').value.trim();
  if (!name) return;
  const id = 'm' + Date.now();
  appData.members.push({
    id, name, role: role || '미정',
    color: COLORS[appData.members.length % COLORS.length],
    thought: '', thoughtDate: todayStr(),
    topPicks: [], holdings: [], ideas: []
  });
  closeAllModals();
  document.getElementById('input-member-name').value = '';
  document.getElementById('input-member-role').value = '';
  renderSidebar();
  selectMember(id);
}

function saveThought() {
  const m = getMember(selectedMemberId);
  if (!m) return;
  m.thought = document.getElementById('input-thought').value;
  m.thoughtDate = todayStr();
  closeAllModals();
  renderMemberView();
}

function addTopPick() {
  const m = getMember(selectedMemberId);
  if (!m) return;
  const name = document.getElementById('input-pick-name').value.trim();
  if (!name) return;
  m.topPicks.push({
    name,
    code: document.getElementById('input-pick-code').value.trim(),
    opinion: document.getElementById('input-pick-opinion').value,
    target: document.getElementById('input-pick-target').value.trim(),
    reason: document.getElementById('input-pick-reason').value.trim()
  });
  closeAllModals();
  ['input-pick-name','input-pick-code','input-pick-target','input-pick-reason'].forEach(id => document.getElementById(id).value = '');
  renderMemberView();
  renderSidebar();
}

function removePick(idx) {
  const m = getMember(selectedMemberId);
  if (!m) return;
  m.topPicks.splice(idx, 1);
  renderMemberView();
  renderSidebar();
}

function addHolding() {
  const m = getMember(selectedMemberId);
  if (!m) return;
  const name = document.getElementById('input-holding-name').value.trim();
  if (!name) return;
  m.holdings.push({
    name,
    sector: document.getElementById('input-holding-sector').value.trim() || '-',
    weight: parseFloat(document.getElementById('input-holding-weight').value) || 0,
    returnPct: parseFloat(document.getElementById('input-holding-return').value) || 0
  });
  closeAllModals();
  ['input-holding-name','input-holding-sector','input-holding-weight','input-holding-return'].forEach(id => document.getElementById(id).value = '');
  renderMemberView();
}

function removeHolding(idx) {
  const m = getMember(selectedMemberId);
  if (!m) return;
  m.holdings.splice(idx, 1);
  renderMemberView();
}

function addIdea() {
  // If on idea board without a member selected, pick first member
  let targetMember;
  if (selectedMemberId) {
    targetMember = getMember(selectedMemberId);
  } else if (appData.members.length > 0) {
    targetMember = appData.members[0];
  } else return;

  const ticker = document.getElementById('input-idea-ticker').value.trim();
  if (!ticker) return;
  targetMember.ideas.push({
    ticker,
    opinion: document.getElementById('input-idea-opinion').value,
    target: document.getElementById('input-idea-target').value.trim(),
    body: document.getElementById('input-idea-body').value.trim(),
    date: todayStr()
  });
  closeAllModals();
  ['input-idea-ticker','input-idea-target','input-idea-body'].forEach(id => document.getElementById(id).value = '');

  if (currentView === 'ideas') showIdeaBoard();
  else renderMemberView();
  renderSidebar();
}

// ===== UTILS =====
function opinionLabel(op) {
  return { buy: '매수', sell: '매도', hold: '보유', watch: '관심' }[op] || op;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function todayStr() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

// Close modal on overlay click
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', (e) => {
    if (e.target === overlay) closeAllModals();
  });
});

// ===== INIT =====
renderSidebar();
selectMember('m1');
</script>
